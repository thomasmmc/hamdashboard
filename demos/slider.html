<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab Nebula: Visible vs. X-Ray</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            flex-direction: column;
        }

        h1 { margin-bottom: 10px; font-weight: 300; letter-spacing: 1px; }
        p { margin-bottom: 20px; color: #888; font-size: 0.9rem; }

        /* The Main Container */
        .slider-container {
            position: relative;
            width: 800px;
            height: 450px; /* 16:9 aspect ratio for these specific NASA images */
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.2);
            cursor: col-resize;
            overflow: hidden;
        }

        /* Common Image Styles */
        .img-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        /* Bottom Image: CHANDRA X-RAY (The "After") */
        .img-xray {
            /* NASA Chandra X-Ray Data */
            background-image: url('https://svs.gsfc.nasa.gov/vis/a030000/a030900/a030944/STScI-H-CrabNebula_xray_1920x1080.png'); 
        }

        /* Top Image: HUBBLE VISIBLE (The "Before") */
        .img-optical {
            /* NASA Hubble Optical Data */
            background-image: url('https://svs.gsfc.nasa.gov/vis/a030000/a030900/a030944/STScI-H-CrabNebula_VIS_1920x1080.png');
            width: 50%;
            border-right: 2px solid white;
            overflow: hidden;
            z-index: 2;
        }

        /* The Slider Handle */
        .slider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .slider-handle::before, .slider-handle::after {
            content: ''; display: block; width: 0; height: 0;
            border-top: 6px solid transparent; border-bottom: 6px solid transparent;
            margin: 0 4px;
        }
        .slider-handle::before { border-right: 8px solid white; }
        .slider-handle::after { border-left: 8px solid white; }

        /* Labels */
        .label {
            position: absolute;
            top: 20px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
        /* Labels */
        .label-opt { left: 20px; z-index: 4; background-color: rgba(255, 255, 255, 0.8); color: black; }
        .label-xray { right: 20px; z-index: 1; background-color: rgba(0, 100, 255, 0.8); color: white; }

    </style>
</head>
<body>

    <h1>The Crab Nebula</h1>
    <p>Slide to reveal the Pulsar Wind Nebula hidden inside</p>
    
    <div class="slider-container" id="slider">
        <div class="img-layer img-xray"></div>
        <span class="label label-xray">Chandra (X-Ray)</span>
        
        <div class="img-layer img-optical" id="topImage">
            <span class="label label-opt">Hubble (Visible)</span>
        </div>
        
        <div class="slider-handle" id="handle"></div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const topImage = document.getElementById('topImage');
        const handle = document.getElementById('handle');

        function moveSlider(e) {
            const rect = slider.getBoundingClientRect();
            let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;

            const percentage = (x / rect.width) * 100;
            topImage.style.width = percentage + '%';
            handle.style.left = percentage + '%';
        }

        slider.addEventListener('mousemove', moveSlider);
        slider.addEventListener('touchmove', moveSlider);
    </script>
</body>
</html>
